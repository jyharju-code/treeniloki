<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<title>Treeniloki</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#0f1115; --card:#191c23; --card2:#21252e; --line:#2c313c;
    --txt:#e7eaf0; --dim:#9aa3b2; --acc:#4f8cff; --acc2:#2f6fe0;
    --good:#36c98b; --warn:#ffb454;
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body{padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 90px)}
  h1,h2,h3{margin:0}
  header{display:flex;align-items:center;justify-content:space-between;
    padding:18px 2px 12px}
  header h1{font-size:22px;letter-spacing:.3px}
  .pill{font-size:12px;color:var(--dim);background:var(--card);
    padding:6px 10px;border-radius:999px;border:1px solid var(--line)}
  .card{background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);padding:14px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--dim);margin:0 0 5px}
  input,select{width:100%;background:var(--card2);border:1px solid var(--line);
    color:var(--txt);font-size:17px;padding:12px;border-radius:10px;outline:none}
  input:focus,select:focus{border-color:var(--acc)}
  .row{display:flex;gap:8px}
  .row>div{flex:1}
  button{font-family:inherit;font-size:16px;font-weight:600;border:none;
    border-radius:11px;padding:14px;color:#fff;background:var(--acc);
    width:100%;margin-top:10px}
  button:active{transform:scale(.985)}
  button.ghost{background:var(--card2);border:1px solid var(--line);color:var(--txt)}
  button.sm{padding:9px 12px;font-size:14px;width:auto;margin:0}
  .muted{color:var(--dim);font-size:13px}
  .last{font-size:13px;color:var(--good);margin-top:8px;min-height:18px}
  .sethdr{display:flex;justify-content:space-between;align-items:center;margin:2px 0 10px}
  .setline{display:flex;align-items:center;gap:10px;padding:9px 10px;
    background:var(--card2);border:1px solid var(--line);border-radius:10px;margin-bottom:7px}
  .setline .n{width:24px;height:24px;border-radius:7px;background:var(--acc);
    display:grid;place-items:center;font-size:13px;font-weight:700}
  .setline .v{flex:1;font-size:16px}
  .setline .x{color:var(--dim);font-size:20px;padding:2px 8px}
  .day{margin-bottom:18px}
  .day .date{font-size:13px;color:var(--dim);margin:0 2px 8px;font-weight:600;
    text-transform:uppercase;letter-spacing:.5px}
  .ex{margin-bottom:9px}
  .ex .nm{font-weight:600;margin-bottom:3px}
  .ex .sets{font-size:14px;color:var(--dim)}
  .empty{text-align:center;color:var(--dim);padding:40px 10px;font-size:15px}
  nav{position:fixed;left:0;right:0;bottom:0;display:flex;
    background:rgba(20,23,29,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    padding:8px 10px calc(env(safe-area-inset-bottom) + 8px)}
  nav button{flex:1;background:none;color:var(--dim);font-size:12px;
    font-weight:600;padding:6px;margin:0;display:flex;flex-direction:column;
    gap:3px;align-items:center}
  nav button .ic{font-size:21px}
  nav button.on{color:var(--acc)}
  .timer{position:fixed;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom) + 78px);
    background:var(--acc);border-radius:14px;padding:12px 16px;display:none;
    align-items:center;justify-content:space-between;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .timer.show{display:flex}
  .timer .t{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .timer button{width:auto;margin:0;padding:8px 14px;background:rgba(255,255,255,.2)}
  .hide{display:none}
  .datalistwrap{position:relative}
</style>
</head>
<body>

<header>
  <h1>Treeniloki</h1>
  <span class="pill" id="streak">–</span>
</header>

<!-- LOKITUS -->
<section id="view-log">
  <div class="card">
    <label for="ex">Liike</label>
    <input id="ex" list="exlist" placeholder="esim. Penkkipunnerrus" autocomplete="off">
    <datalist id="exlist"></datalist>
    <div class="last" id="lasthint"></div>

    <div class="row" style="margin-top:12px">
      <div>
        <label for="kg">Paino (kg)</label>
        <input id="kg" type="number" inputmode="decimal" step="0.5" placeholder="0">
      </div>
      <div>
        <label for="reps">Toistot</label>
        <input id="reps" type="number" inputmode="numeric" step="1" placeholder="0">
      </div>
    </div>
    <button id="addSet">+ Lisää sarja</button>
  </div>

  <div class="card" id="todayCard">
    <div class="sethdr">
      <h3 style="font-size:16px">Tämän liikkeen sarjat tänään</h3>
      <button class="ghost sm" id="restBtn">Lepo ▸</button>
    </div>
    <div id="todaySets"><div class="muted">Ei vielä sarjoja.</div></div>
  </div>
</section>

<!-- HISTORIA -->
<section id="view-hist" class="hide">
  <div id="histList"></div>
</section>

<!-- ASETUKSET -->
<section id="view-set" class="hide">
  <div class="card">
    <h3 style="font-size:16px;margin-bottom:10px">Varmuuskopio</h3>
    <p class="muted" style="margin:0 0 12px">Vie data tiedostoon Files-appiin. Tee tämä silloin tällöin — näin data on turvassa vaikka iOS siivoaisi selaindatan.</p>
    <button id="exportBtn">⤓ Vie varmuuskopio (.json)</button>
    <button class="ghost" id="importBtn">⤒ Tuo varmuuskopio</button>
    <button class="ghost" id="csvBtn">▤ Vie CSV (Numbers/Excel)</button>
    <input type="file" id="importFile" accept="application/json" class="hide">
  </div>
  <div class="card">
    <h3 style="font-size:16px;margin-bottom:8px">Lepotaimerin pituus</h3>
    <select id="restLen">
      <option value="60">1:00</option>
      <option value="90" selected>1:30</option>
      <option value="120">2:00</option>
      <option value="180">3:00</option>
    </select>
  </div>
  <div class="card">
    <p class="muted" style="margin:0">Treenejä yhteensä: <b id="statSessions">0</b> · sarjoja: <b id="statSets">0</b></p>
    <button class="ghost" id="wipeBtn" style="margin-top:12px">Tyhjennä kaikki data</button>
  </div>
</section>

<!-- LEPOTAIMERI -->
<div class="timer" id="timer">
  <span class="t" id="timerT">0:00</span>
  <div style="display:flex;gap:8px">
    <button id="timerPlus">+30s</button>
    <button id="timerStop">Lopeta</button>
  </div>
</div>

<nav>
  <button data-v="log" class="on"><span class="ic">＋</span>Lokita</button>
  <button data-v="hist"><span class="ic">▤</span>Historia</button>
  <button data-v="set"><span class="ic">⚙</span>Asetukset</button>
</nav>

<script>
const $ = s => document.querySelector(s);
const KEY = "treeniloki.v1";
const todayStr = () => new Date().toISOString().slice(0,10);

// ---- data ----
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {sets:[]}; }catch(e){ return {sets:[]}; } }
function save(d){ localStorage.setItem(KEY, JSON.stringify(d)); }
let db = load();

// ---- helpers ----
function exNames(){
  return [...new Set(db.sets.map(s=>s.ex))].sort((a,b)=>a.localeCompare(b,'fi'));
}
function refreshDatalist(){
  $("#exlist").innerHTML = exNames().map(n=>`<option value="${esc(n)}">`).join("");
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function lastSessionFor(ex){
  const days = [...new Set(db.sets.filter(s=>s.ex===ex).map(s=>s.date))].sort();
  if(!days.length) return null;
  // viimeisin päivä joka ei ole tänään (vertailukohta)
  const prev = days.filter(d=>d!==todayStr());
  const day = prev.length ? prev[prev.length-1] : days[days.length-1];
  const sets = db.sets.filter(s=>s.ex===ex && s.date===day);
  return {day, sets};
}

function updateLastHint(){
  const ex = $("#ex").value.trim();
  const el = $("#lasthint");
  if(!ex){ el.textContent=""; return; }
  const last = lastSessionFor(ex);
  if(!last){ el.textContent="Ensimmäinen kerta — hyvä!"; return; }
  const txt = last.sets.map(s=>`${s.kg}×${s.reps}`).join("  ");
  el.textContent = `Edellinen (${fmtDate(last.day)}): ${txt}`;
}

function todaySetsFor(ex){
  return db.sets.filter(s=>s.ex===ex && s.date===todayStr());
}
function renderToday(){
  const ex = $("#ex").value.trim();
  const box = $("#todaySets");
  if(!ex){ box.innerHTML='<div class="muted">Valitse liike yltä.</div>'; return; }
  const sets = todaySetsFor(ex);
  if(!sets.length){ box.innerHTML='<div class="muted">Ei vielä sarjoja tänään.</div>'; return; }
  box.innerHTML = sets.map((s,i)=>`
    <div class="setline">
      <span class="n">${i+1}</span>
      <span class="v">${s.kg} kg × ${s.reps}</span>
      <span class="x" data-id="${s.id}">✕</span>
    </div>`).join("");
  box.querySelectorAll(".x").forEach(b=>b.onclick=()=>{
    db.sets = db.sets.filter(s=>s.id!==b.dataset.id); save(db); renderAll();
  });
}

function fmtDate(d){
  const [y,m,day]=d.split("-");
  return `${day}.${m}.`;
}

function renderHistory(){
  const box = $("#histList");
  if(!db.sets.length){ box.innerHTML='<div class="empty">Ei vielä treenejä.<br>Lisää ensimmäinen sarja!</div>'; return; }
  const days = [...new Set(db.sets.map(s=>s.date))].sort().reverse();
  box.innerHTML = days.map(d=>{
    const daySets = db.sets.filter(s=>s.date===d);
    const exs = [...new Set(daySets.map(s=>s.ex))];
    const body = exs.map(ex=>{
      const ss = daySets.filter(s=>s.ex===ex);
      return `<div class="ex"><div class="nm">${esc(ex)}</div>
        <div class="sets">${ss.map(s=>`${s.kg}×${s.reps}`).join(" · ")}</div></div>`;
    }).join("");
    const full = new Date(d).toLocaleDateString('fi-FI',{weekday:'long',day:'numeric',month:'long'});
    return `<div class="day card"><div class="date">${full}</div>${body}</div>`;
  }).join("");
}

function renderStats(){
  const sessions = new Set(db.sets.map(s=>s.date)).size;
  $("#statSessions").textContent = sessions;
  $("#statSets").textContent = db.sets.length;
  // streak: peräkkäiset päivät tähän asti
  $("#streak").textContent = sessions ? `${sessions} treeniä` : "Aloita!";
}

function renderAll(){ refreshDatalist(); updateLastHint(); renderToday(); renderHistory(); renderStats(); }

// ---- add set ----
$("#addSet").onclick = ()=>{
  const ex = $("#ex").value.trim();
  const kg = parseFloat($("#kg").value);
  const reps = parseInt($("#reps").value,10);
  if(!ex){ $("#ex").focus(); return; }
  if(isNaN(kg) || isNaN(reps) || reps<=0){ $("#kg").focus(); return; }
  db.sets.push({id:String(performance.now())+Math.round(kg*reps),ex,kg,reps,date:todayStr(),t:new Date().toISOString()});
  save(db);
  if(navigator.vibrate) navigator.vibrate(15);
  renderAll();
  startRest(); // automaattinen lepotaimeri
};

$("#ex").addEventListener("input", ()=>{ updateLastHint(); renderToday();
  // esitäytä edellisen kerran paino/toistot ehdotukseksi
  const last = lastSessionFor($("#ex").value.trim());
  if(last && last.sets.length && !$("#kg").value && !$("#reps").value){
    const s = last.sets[last.sets.length-1];
    $("#kg").placeholder = s.kg; $("#reps").placeholder = s.reps;
  }
});

// ---- rest timer ----
let restRemain=0, restInt=null;
function restLen(){ return parseInt($("#restLen").value,10)||90; }
function showTimer(){ $("#timer").classList.add("show"); }
function hideTimer(){ $("#timer").classList.remove("show"); }
function paintTimer(){ const m=Math.floor(restRemain/60),s=restRemain%60;
  $("#timerT").textContent=`${m}:${String(s).padStart(2,'0')}`; }
function startRest(){
  clearInterval(restInt); restRemain=restLen(); showTimer(); paintTimer();
  restInt=setInterval(()=>{
    restRemain--; paintTimer();
    if(restRemain<=0){ clearInterval(restInt); if(navigator.vibrate)navigator.vibrate([200,100,200]);
      setTimeout(hideTimer,1500); }
  },1000);
}
$("#restBtn").onclick=startRest;
$("#timerStop").onclick=()=>{ clearInterval(restInt); hideTimer(); };
$("#timerPlus").onclick=()=>{ restRemain+=30; paintTimer(); };

// ---- nav ----
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  ["log","hist","set"].forEach(v=>$("#view-"+v).classList.toggle("hide", v!==b.dataset.v));
  if(b.dataset.v==="hist") renderHistory();
});

// ---- backup ----
$("#exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  dl(blob, `treeniloki-${todayStr()}.json`);
};
$("#csvBtn").onclick=()=>{
  const rows=[["paiva","liike","paino_kg","toistot"]];
  db.sets.slice().sort((a,b)=>a.t.localeCompare(b.t)).forEach(s=>rows.push([s.date,s.ex,s.kg,s.reps]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  dl(new Blob([csv],{type:"text/csv"}), `treeniloki-${todayStr()}.csv`);
};
function dl(blob,name){ const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000); }
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    if(!d.sets||!Array.isArray(d.sets)) throw 0;
    if(confirm(`Tuodaan ${d.sets.length} sarjaa. Korvataan nykyinen data?`)){
      db=d; save(db); renderAll(); alert("Tuotu!");
    }
  }catch(_){ alert("Virheellinen tiedosto."); } };
  r.readAsText(f);
};
$("#wipeBtn").onclick=()=>{ if(confirm("Poistetaanko KAIKKI data? Tee varmuuskopio ensin.")){
  db={sets:[]}; save(db); renderAll(); } };

// ---- init ----
renderAll();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
